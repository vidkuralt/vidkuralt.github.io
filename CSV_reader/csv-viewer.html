<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Beautiful CSV viewer with drag & drop, sorting, and copy functionality">
    <meta name="theme-color" content="#0a0e17">
    <title>CSV Viewer Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #151922;
            --bg-tertiary: #1e2530;
            --accent-primary: #00d4aa;
            --accent-secondary: #0096ff;
            --text-primary: #e8edf4;
            --text-secondary: #8b96a8;
            --border-color: #2a3241;
            --hover-bg: #252d3d;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
            --frozen-col-bg: #161d28;
            --frozen-col-hover: #1e2a3a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Instrument Sans', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(0,212,170,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(0,150,255,0.06) 0%, transparent 50%);
            animation: gradientShift 20s ease infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%, 100% { transform: translate(0,0) rotate(0deg); }
            50%       { transform: translate(10%,10%) rotate(180deg); }
        }

        .app-container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }

        .logo { display: flex; align-items: center; gap: 1rem; }

        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'DM Serif Display', serif;
            font-size: 20px; font-weight: bold;
            color: var(--bg-primary);
            box-shadow: 0 4px 12px rgba(0,212,170,0.3);
        }

        .logo h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 24px; font-weight: 400;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        /* ── Toggle group ── */
        .toggle-group {
            display: flex;
            align-items: center;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.5rem 0.9rem;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .toggle-item:hover { background: var(--hover-bg); }

        .toggle-item + .toggle-item {
            border-left: 1px solid var(--border-color);
        }

        .toggle-switch {
            position: relative;
            width: 34px; height: 20px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0; width: 0; height: 0; position: absolute;
        }

        .toggle-track {
            position: absolute;
            inset: 0;
            background: var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.25s;
        }

        .toggle-track::after {
            content: '';
            position: absolute;
            top: 4px; left: 4px;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--text-secondary);
            transition: transform 0.25s, background 0.25s;
        }

        .toggle-switch input:checked + .toggle-track {
            background: rgba(0,212,170,0.35);
        }

        .toggle-switch input:checked + .toggle-track::after {
            transform: translateX(14px);
            background: var(--accent-primary);
        }

        /* ── Buttons ── */
        .btn {
            padding: 0.6rem 1.2rem;
            border: none; border-radius: 8px;
            font-family: 'Instrument Sans', sans-serif;
            font-size: 14px; font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 0.4rem;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: var(--bg-primary);
            box-shadow: 0 4px 12px rgba(0,212,170,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(0,212,170,0.45);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--hover-bg);
            border-color: var(--accent-primary);
        }

        /* ── Main content ── */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 1.5rem 2rem;
            gap: 1rem;
            min-height: 0;
        }

        .drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
            background: var(--bg-secondary);
            transition: all 0.3s;
            cursor: pointer;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--accent-primary);
            background: rgba(0,212,170,0.05);
            transform: scale(1.01);
        }

        .drop-zone-content { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
        .drop-icon { font-size: 48px; opacity: 0.6; }

        .drop-zone h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 24px; font-weight: 400;
        }

        .drop-zone p { color: var(--text-secondary); font-size: 14px; }

        .stats-bar {
            display: flex;
            gap: 1rem;
            padding: 0.75rem 1.5rem;
            background: var(--bg-secondary);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .stat-item { display: flex; flex-direction: column; gap: 0.2rem; }

        .stat-label {
            font-size: 11px; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--text-secondary);
            font-family: 'IBM Plex Mono', monospace;
        }

        .stat-value { font-size: 18px; font-weight: 600; color: var(--accent-primary); }
        .stat-divider { width: 1px; background: var(--border-color); margin: 0 0.25rem; }

        /* ── Table container ── */
        .table-container {
            flex: 1;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: none;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
            min-height: 0;
            overflow: hidden;
        }

        .table-container.visible {
            display: flex;
            animation: fadeInUp 0.4s ease;
        }

        /* ── Table wrapper & scrollbars ── */
        .table-wrapper {
            flex: 1;
            overflow: auto;
            min-height: 0;
        }

        /* Green scrollbar — always visible, glows on hover */
        .table-wrapper::-webkit-scrollbar {
            width: 14px;
            height: 14px;
        }

        .table-wrapper::-webkit-scrollbar-track {
            background: #0d1119;
        }

        .table-wrapper::-webkit-scrollbar-corner {
            background: #0d1119;
        }

        .table-wrapper::-webkit-scrollbar-thumb {
            background: #00855e;
            border-radius: 7px;
            border: 3px solid #0d1119;
        }

        .table-wrapper::-webkit-scrollbar-thumb:hover {
            background: #00d4aa;
            box-shadow: 0 0 8px #00d4aa, 0 0 18px rgba(0,212,170,0.5);
        }

        /* Firefox */
        .table-wrapper {
            scrollbar-width: thick;
            scrollbar-color: #00855e #0d1119;
        }

        /* ── Table ── */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 20;
        }

        th {
            padding: 0.9rem 1.5rem;
            text-align: left;
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            border-bottom: 2px solid var(--border-color);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            transition: background 0.15s, color 0.15s;
            position: relative;
        }

        th:hover { background: var(--hover-bg); color: var(--accent-primary); }

        th.sortable::after    { content: ' ⇅'; opacity: 0.35; }
        th.sorted-asc::after  { content: ' ↑'; opacity: 1; color: var(--accent-primary); }
        th.sorted-desc::after { content: ' ↓'; opacity: 1; color: var(--accent-primary); }

        /* ── Frozen first column ── */
        th:first-child,
        td:first-child {
            position: sticky;
            left: 0;
            z-index: 5;
        }

        thead th:first-child {
            z-index: 25;
            background: var(--bg-tertiary);
        }

        td:first-child {
            background: var(--frozen-col-bg);
            border-right: 1px solid rgba(0,212,170,0.25);
        }

        thead th:first-child {
            border-right: 1px solid rgba(0,212,170,0.25);
        }

        td:first-child::after,
        thead th:first-child::after {
            content: '';
            position: absolute;
            top: 0; right: -6px;
            width: 6px; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.35), transparent);
            pointer-events: none;
            z-index: 1;
        }

        tbody tr:hover td:first-child { background: var(--frozen-col-hover); }

        /* ── Rows ── */
        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: var(--hover-bg); }
        tbody tr:nth-child(even) { background: rgba(255,255,255,0.015); }
        tbody tr:nth-child(even):hover { background: var(--hover-bg); }

        td {
            padding: 0.85rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-primary);
            font-family: 'IBM Plex Mono', monospace;
            white-space: nowrap;
            position: relative;
        }

        td:hover { background: rgba(0,212,170,0.06); cursor: pointer; }

        /* ── Pinned badge ── */
        .frozen-badge {
            display: inline-block;
            margin-left: 6px;
            padding: 1px 5px;
            background: rgba(0,212,170,0.15);
            color: var(--accent-primary);
            border-radius: 3px;
            font-size: 9px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            vertical-align: middle;
            font-family: 'IBM Plex Mono', monospace;
        }

        /* ── Toggle overrides ── */

        /* Sticky header OFF */
        .no-sticky-header thead {
            position: relative !important;
            top: auto !important;
            z-index: 1 !important;
        }

        .no-sticky-header thead th:first-child {
            z-index: 5 !important;
        }

        /* Frozen column OFF */
        .no-frozen-col th:first-child,
        .no-frozen-col td:first-child {
            position: static !important;
            left: auto !important;
            z-index: auto !important;
            border-right: none !important;
        }

        .no-frozen-col td:first-child {
            background: inherit !important;
        }

        .no-frozen-col thead th:first-child {
            background: var(--bg-tertiary) !important;
        }

        .no-frozen-col td:first-child::after,
        .no-frozen-col thead th:first-child::after {
            display: none !important;
        }

        .no-frozen-col .frozen-badge {
            display: none !important;
        }

        /* ── Misc ── */
        .copy-notification {
            position: fixed;
            bottom: 2rem; right: 2rem;
            padding: 0.9rem 1.4rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: var(--bg-primary);
            border-radius: 8px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,212,170,0.4);
            opacity: 0;
            transform: translateY(16px);
            transition: all 0.3s;
            pointer-events: none;
            z-index: 9999;
            font-size: 14px;
        }

        .copy-notification.show { opacity: 1; transform: translateY(0); }

        #fileInput { display: none; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .filename-display {
            padding: 0.4rem 0.9rem;
            background: var(--bg-tertiary);
            border-radius: 6px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            display: flex; align-items: center; gap: 0.5rem;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<div class="app-container">
    <header>
        <div class="logo">
            <div class="logo-icon">Ⅽ</div>
            <h1>CSV Viewer Pro</h1>
        </div>
        <div class="header-actions">

            <div class="toggle-group">
                <label class="toggle-item" title="Freeze header row when scrolling down">
                    <span class="toggle-switch">
                        <input type="checkbox" id="toggleHeader" checked onchange="applyToggles()">
                        <span class="toggle-track"></span>
                    </span>
                    Sticky header
                </label>
                <label class="toggle-item" title="Freeze first column when scrolling right">
                    <span class="toggle-switch">
                        <input type="checkbox" id="toggleColumn" checked onchange="applyToggles()">
                        <span class="toggle-track"></span>
                    </span>
                    Frozen column
                </label>
            </div>

            <button class="btn btn-secondary" onclick="clearData()">✕ Clear</button>
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">📁 Import CSV</button>
        </div>
    </header>

    <div class="main-content">
        <div class="empty-state" id="emptyState">
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="drop-zone-content">
                    <div class="drop-icon">📊</div>
                    <h2>Drop your CSV file here</h2>
                    <p>or click to browse</p>
                </div>
            </div>
        </div>

        <div id="fileInfo" class="filename-display" style="display:none;"></div>

        <div id="statsBar" class="stats-bar" style="display:none;">
            <div class="stat-item">
                <span class="stat-label">Rows</span>
                <span class="stat-value" id="rowCount">0</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <span class="stat-label">Columns</span>
                <span class="stat-value" id="colCount">0</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <span class="stat-label">Size</span>
                <span class="stat-value" id="fileSize">0 KB</span>
            </div>
        </div>

        <div id="tableContainer" class="table-container">
            <div class="table-wrapper" id="tableWrapper">
                <table id="dataTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<input type="file" id="fileInput" accept=".csv">
<div id="copyNotification" class="copy-notification">✓ Copied to clipboard</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
    let csvData = [];
    let currentSort = { column: null, direction: null };
    let currentFileName = '';

    document.getElementById('fileInput').addEventListener('change', e => {
        if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    const dropZone = document.getElementById('dropZone');

    ['dragenter','dragover','dragleave','drop'].forEach(ev => {
        dropZone.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); });
        document.body.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); });
    });

    ['dragenter','dragover'].forEach(ev =>
        dropZone.addEventListener(ev, () => dropZone.classList.add('drag-over')));
    ['dragleave','drop'].forEach(ev =>
        dropZone.addEventListener(ev, () => dropZone.classList.remove('drag-over')));

    dropZone.addEventListener('drop', e => {
        const f = e.dataTransfer.files[0];
        if (f) handleFile(f);
    });

    function handleFile(file) {
        if (!file.name.toLowerCase().endsWith('.csv')) {
            alert('Please select a CSV file.');
            return;
        }
        currentFileName = file.name;
        Papa.parse(file, {
            complete(results) {
                csvData = results.data.filter(row => row.some(c => c !== ''));
                displayData();
                updateStats(file.size);
            },
            error(err) { alert('Error parsing CSV: ' + err.message); }
        });
    }

    function displayData() {
        if (!csvData.length) return;

        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('statsBar').style.display = 'flex';
        document.getElementById('fileInfo').style.display = 'flex';
        document.getElementById('fileInfo').textContent = '📄 ' + currentFileName;
        document.getElementById('tableContainer').classList.add('visible');

        const headers = csvData[0];
        const thead = document.getElementById('tableHead');
        thead.innerHTML = '';
        const headerRow = document.createElement('tr');

        headers.forEach((h, i) => {
            const th = document.createElement('th');
            th.classList.add('sortable');
            th.onclick = () => sortColumn(i);
            if (i === 0) {
                th.innerHTML = escapeHTML(h) + '<span class="frozen-badge">pinned</span>';
            } else {
                th.textContent = h;
            }
            headerRow.appendChild(th);
        });

        thead.appendChild(headerRow);
        renderRows(csvData.slice(1));
        applyToggles();
    }

    function renderRows(rows) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const frag = document.createDocumentFragment();
        rows.forEach(row => {
            const tr = document.createElement('tr');
            row.forEach(cell => {
                const td = document.createElement('td');
                td.textContent = cell;
                td.onclick = () => copyCell(cell);
                tr.appendChild(td);
            });
            frag.appendChild(tr);
        });
        tbody.appendChild(frag);
    }

    function sortColumn(idx) {
        if (currentSort.column === idx) {
            if      (currentSort.direction === 'asc')  currentSort.direction = 'desc';
            else if (currentSort.direction === 'desc') { currentSort.direction = null; currentSort.column = null; }
            else                                        currentSort.direction = 'asc';
        } else {
            currentSort.column = idx;
            currentSort.direction = 'asc';
        }

        document.querySelectorAll('th').forEach((th, i) => {
            th.classList.remove('sorted-asc', 'sorted-desc');
            if (i === idx) {
                if (currentSort.direction === 'asc')  th.classList.add('sorted-asc');
                if (currentSort.direction === 'desc') th.classList.add('sorted-desc');
            }
        });

        let rows = csvData.slice(1);
        if (currentSort.direction) {
            rows = [...rows].sort((a, b) => {
                const av = a[idx], bv = b[idx];
                const an = parseFloat(av), bn = parseFloat(bv);
                if (!isNaN(an) && !isNaN(bn)) return currentSort.direction === 'asc' ? an - bn : bn - an;
                const c = av.localeCompare(bv);
                return currentSort.direction === 'asc' ? c : -c;
            });
        }
        renderRows(rows);
    }

    function copyCell(text) {
        navigator.clipboard.writeText(text).then(() => {
            const n = document.getElementById('copyNotification');
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 2000);
        });
    }

    function updateStats(size) {
        document.getElementById('rowCount').textContent = (csvData.length - 1).toLocaleString();
        document.getElementById('colCount').textContent = csvData[0].length;
        document.getElementById('fileSize').textContent = (size / 1024).toFixed(1) + ' KB';
    }

    function applyToggles() {
        const wrapper = document.getElementById('tableWrapper');
        const stickyOn = document.getElementById('toggleHeader').checked;
        const frozenOn = document.getElementById('toggleColumn').checked;
        wrapper.classList.toggle('no-sticky-header', !stickyOn);
        wrapper.classList.toggle('no-frozen-col',    !frozenOn);
    }

    function clearData() {
        csvData = [];
        currentSort = { column: null, direction: null };
        currentFileName = '';
        document.getElementById('emptyState').style.display = 'flex';
        document.getElementById('statsBar').style.display = 'none';
        document.getElementById('tableContainer').classList.remove('visible');
        document.getElementById('fileInfo').style.display = 'none';
        document.getElementById('tableHead').innerHTML = '';
        document.getElementById('tableBody').innerHTML = '';
        document.getElementById('fileInput').value = '';
    }

    function escapeHTML(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
</script>
</body>
</html>
